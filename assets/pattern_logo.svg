<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 40" fill="none">
  <!-- Pattern logo mark — two parallel bars at 45 degrees -->
  <g>
    <rect x="3" y="2" width="8.5" height="26" rx="3" transform="rotate(-45 7.25 15)" fill="#00BCD4"/>
    <rect x="14" y="2" width="8.5" height="26" rx="3" transform="rotate(-45 18.25 15)" fill="#00BCD4"/>
  </g>
  <!-- "pattern" wordmark -->
  <text x="48" y="28" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="600" fill="white" letter-spacing="0.5">pattern</text>
</svg>
